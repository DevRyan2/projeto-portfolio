<svg viewBox="0 0 680 680" width="100%" role="img" xmlns="http://www.w3.org/2000/svg" style="">
<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Favicon melhorado - ícone de código</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Ícone circular com símbolo de código, gradiente e visual moderno</desc>
<defs>
  <radialGradient id="bg" cx="50%" cy="40%" r="60%">
    <stop offset="0%" stop-color="#1e2a4a"/>
    <stop offset="100%" stop-color="#0a0f1e"/>
  </radialGradient>
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#4f8ef7" stop-opacity="0.3"/>
    <stop offset="100%" stop-color="#4f8ef7" stop-opacity="0"/>
  </radialGradient>
  <filter id="blur">
    <feGaussianBlur stdDeviation="18"/>
  </filter>
</defs>

<circle cx="340" cy="340" r="300" fill="url(#bg)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
